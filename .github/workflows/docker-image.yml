name: Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/main/**"
      - "lib/**"
      - ".github/workflows/docker-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-vulkan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_base=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/llama.cpp-hub" >> "$GITHUB_OUTPUT"

      - name: Compose Vulkan tags
        id: tags
        shell: bash
        run: |
          IMAGE_BASE="${{ steps.image.outputs.image_base }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=(
            "${IMAGE_BASE}:vulkan"
            "${IMAGE_BASE}:sha-${SHORT_SHA}-vulkan"
          )

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${IMAGE_BASE}:${VERSION_TAG}")
            TAGS+=("${IMAGE_BASE}:${VERSION_TAG}-vulkan")
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS+=("${IMAGE_BASE}:latest")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: final
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}

  build-rocm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_base=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/llama.cpp-hub" >> "$GITHUB_OUTPUT"

      - name: Compose ROCm tags
        id: tags
        shell: bash
        run: |
          IMAGE_BASE="${{ steps.image.outputs.image_base }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS=(
            "${IMAGE_BASE}:rocm"
            "${IMAGE_BASE}:sha-${SHORT_SHA}-rocm"
          )

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS+=("${IMAGE_BASE}:${VERSION_TAG}-rocm")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: runtime-rocm
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
